version: 0.2

phases:
  install:
    commands:
      - echo Installing dependencies

  pre_build:
    commands:
      - echo Logging in to ECR
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 625189191223.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image
      - docker build -t my-app .
      - docker tag my-app:latest 625189191223.dkr.ecr.us-east-1.amazonaws.com/my-app:latest

  post_build:
    commands:
      - echo Pushing Docker image
      - docker push 625189191223.dkr.ecr.us-east-1.amazonaws.com/my-app:latest